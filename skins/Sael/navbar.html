<!-- NAVBAR — shared across records.html, charts.html, and climate.html via
     the w3-include-html pattern (see includeHTML() in each page's own
     script block). index.html deliberately does NOT use this file: its
     navbar has genuinely different content (no "Home" link, since it IS
     home; plus its own Forecast/Observations/Almanac scroll-nav buttons
     that don't apply anywhere else), not just a styling difference, so
     sharing one file there would mean branching this markup internally
     for no real benefit.

     This is the first time these three pages' navbars have been a single
     source of truth rather than three hand-maintained copies — reconciled
     during that consolidation:
       - records.html's brand-link and Home button still pointed at the
         old birches.html (a stale leftover from before that file was
         renamed to index.html in an earlier session) — fixed here.
       - climate.html's #unitSystem was missing the "Beaufort wind"
         option that records.html/charts.html both have, because
         climate.html's own SYSTEMS object had no 'beaufort' entry yet.
         Rather than leave this shared file inconsistent across pages,
         climate.html gained real (if simplified — a table cell suits a
         plain force number better than records.html's "F3 · Gentle
         breeze") Beaufort support of its own. See climate.html's SYSTEMS/
         convWind/windUnitLabel for that.
       - Dropped the unused id="recordsNavMenu" and data-cat="..."
         attributes some of these pages had on dropdown-item links —
         confirmed (via grep across every page's JS) that nothing
         actually reads them.

     Added a "Global Forecasts" link after Almanac for the new
     locationforecast.html page (search-any-location forecast, separate
     from the fixed-station Forecast section on index.html). index.html
     doesn't include this file (see above), so its own copy of this nav
     block needed the same link added by hand — see that file's <nav>.

     Added a "Gallery" link after that for gallery.html (admin-configured
     maps/webcams/time-lapses, see that file's own header comment) — same
     index.html-needs-the-same-edit-by-hand caveat applies.

     Brand text was "DivumRI" + a separate "COMMUNITY WEATHER" subtitle
     here, but just plain "COMMUNITY WEATHER" (no DivumRI) on index.html
     — drifted apart at some point, visibly so (different text on every
     other page vs. the homepage). Changed to match index.html's text
     exactly, since that's the one page that can't use this shared file
     and so is the de facto source of truth for "what the navbar should
     say". Also dropped an extra "nav-btn" class on #themeToggle that had
     crept in here but not on index.html's copy — #themeToggle's own CSS
     rule means this was probably an invisible difference, but no reason
     to leave the markup mismatched.

     Renamed the site brand from "Community Weather" to "AllSeasons"
     (was "DivumRI"/"COMMUNITY WEATHER" drift before that, see above —
     this is a second rename on top of that fix, not a reversion of it).
     Shortened "Global Forecasts" to "Forecasts" to match the other
     single-word labels, and added a title="" tooltip to every nav item.

     Renamed again, "AllSeasons" → "Sǣl" (uppercase: "SǢL" — U+01E2/U+01E3,
     LATIN CAPITAL/SMALL LETTER AE WITH MACRON, not a stylized "AE"; make
     sure whatever's editing/serving this file is saving as UTF-8 or this
     will corrupt).

     Removed the "Gallery" link entirely (gallery.html itself still
     exists on the server, just unreachable from any nav now — this was
     a request to unlink it, not to delete the page; say so explicitly
     if that page should actually come down).

     IMPORTANT for whichever page includes this: #unitSystem and the
     theme toggle's #themeMenu/#themeIconSun/#themeIconMoon all live in
     here. Any script that attaches listeners to those (the unit-system
     change handler, theme click handlers, applyTheme()'s icon sync)
     has to wait until this include has actually landed in the DOM —
     see each page's own includeHTML() callback gating for how. -->
