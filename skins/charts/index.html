<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nothing to see here</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #f8f4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 1.5rem;
        }

        .card {
            max-width: 640px;
            width: 100%;
            background: #ffffff;
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08), 0 8px 24px -6px rgba(0, 0, 0, 0.02);
            padding: 3rem 2.5rem;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 28px 48px -16px rgba(0, 0, 0, 0.12);
        }

        .icon {
            font-size: 4.5rem;
            line-height: 1;
            margin-bottom: 1rem;
            display: inline-block;
            filter: grayscale(0.2);
            letter-spacing: 4px;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 450;
            letter-spacing: -0.02em;
            color: #1c1c1a;
            margin-bottom: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: baseline;
            gap: 0.25rem 0.6rem;
        }

        .accent {
            background: #f0ebe3;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            font-weight: 380;
            color: #3b3b37;
            font-size: 0.9em;
            letter-spacing: 0.02em;
        }

        .sub {
            font-size: 1.15rem;
            color: #5b5b56;
            margin-top: 0.25rem;
            margin-bottom: 1.8rem;
            font-weight: 350;
            border-top: 1px dashed #ded9d0;
            border-bottom: 1px dashed #ded9d0;
            padding: 0.9rem 0.5rem;
            display: inline-block;
            background: #fcfaf7;
            border-radius: 60px;
            padding-left: 1.8rem;
            padding-right: 1.8rem;
            backdrop-filter: blur(2px);
        }

        .divider {
            width: 60px;
            height: 2px;
            background: #d6cec2;
            margin: 1.4rem auto 1.8rem auto;
            border-radius: 10px;
            opacity: 0.5;
        }

        .message {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #2e2e2a;
            background: #fbf9f6;
            padding: 1.4rem 1.8rem;
            border-radius: 2rem;
            border: 1px solid #f0ebe3;
            box-shadow: inset 0 1px 4px rgba(255, 255, 255, 0.8);
            max-width: 90%;
            margin: 0 auto;
        }

        .message span {
            background: #f1ede7;
            padding: 0.1rem 0.5rem;
            border-radius: 30px;
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', monospace;
            font-size: 0.9rem;
            color: #3a3a35;
            letter-spacing: 0.01em;
        }

        .footer-note {
            margin-top: 2.2rem;
            font-size: 0.8rem;
            color: #9f9b94;
            letter-spacing: 0.4px;
            font-weight: 380;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .footer-note span {
            background: #f3f0ea;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            color: #6f6b63;
        }

        .pulse {
            display: inline-block;
            animation: softPulse 4s infinite ease-in-out;
        }

        @keyframes softPulse {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.7; transform: scale(1); }
        }

        /* tiny touch for empty space */
        .empty-space {
            display: block;
            height: 0.4rem;
        }

        /* responsive */
        @media (max-width: 500px) {
            .card {
                padding: 2.2rem 1.2rem;
                border-radius: 2rem;
            }
            h1 {
                font-size: 1.9rem;
                gap: 0.2rem;
            }
            .icon {
                font-size: 3.4rem;
            }
            .sub {
                font-size: 1rem;
                padding: 0.6rem 1.2rem;
            }
            .message {
                font-size: 0.95rem;
                padding: 1.2rem 1rem;
            }
        }
    </style>
</head>

</html>
